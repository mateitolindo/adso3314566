<style>
    .graficos-box { 
        background-color: #e0e0ce; 
        color: black; 
        padding: 20px; 
        width: 400px; 
        border-radius: 4px; 
        font-family: sans-serif;
    }
    .graficos-box h2 { 
        margin-top: 0; 
        font-size: 1.2em; 
        border-bottom: 2px solid black; 
    }
    .canvas-area { 
        border: 1px solid #999; 
        margin: 10px 0; 
        background: white; 
        display: block;
    }
    hr { 
        border: 0; 
        border-top: 2px solid black; 
        margin: 20px 0; 
    }
</style>
<div class="graficos-box">
    <h2>Canvas</h2>
    <canvas id="miCanvas" width="300" height="100" class="canvas-area"></canvas>
    
    <hr>
    
    <h2>SVG</h2>
    <svg width="300" height="100">
        <rect x="20" y="10" width="80" height="70" fill="#1e71be" />
        <circle cx="150" cy="45" r="35" fill="#1fb122" />
        <text x="210" y="85" font-size="14">SVG</text>
    </svg>
</div>

<script>
    const canvas = document.getElementById('miCanvas');
    const ctx = canvas.getContext('2d');

    // Rectángulo Naranja
    ctx.fillStyle = '#e69138';
    ctx.fillRect(20, 20, 90, 45);

    // Círculo Rojo
    ctx.fillStyle = '#cc4125';
    ctx.beginPath();
    ctx.arc(160, 42, 28, 0, Math.PI * 2);
    ctx.fill();
</script>
