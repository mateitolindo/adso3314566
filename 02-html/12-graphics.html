<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12-colors-alpha</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
    figure.chococrispi {
        background: url(../src/imgs/chococrispi.jpg)no-repeat center/cover;
        border: 4px solid #fff;
        margin-block: 2rem;
        height: 360px;
        width: 380px;
        div {
            height: calc(300px/3);
            &.box1 {
                background-color: rgba(255, 255, 255, 0.5)
            }
            &.box2 {
                background-color: #d6cfcf60;
            }
            &.box3 {
                background-color: hsla(0,0%,50%, 0.5)
            }
        }
    }

    main {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    section {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    header {
        text-align: center;
    }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg class="SVGBGI" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path class="accent" d="M12 20V4l-8 8 8 8z"></path><path class="outline" d="m2.29,12.71l8,8c.39.39,1.02.39,1.41,0s.39-1.02,0-1.41l-6.29-6.29h15.59c.55,0,1-.45,1-1s-.45-1-1-1H5.41l6.29-6.29c.39-.39.39-1.02,0-1.41-.2-.2-.45-.29-.71-.29s-.51.1-.71.29L2.29,11.29c-.39.39-.39,1.02,0,1.41Z"></path><path class="solid" d="m1.58 13.42 8 8a2 2 0 0 0 2.83-2.83L7.82 14h13.17c1.1 0 2-.9 2-2s-.9-2-2-2H7.83l4.59-4.59a2 2 0 0 0-1.41-3.42 2 2 0 0 0-1.41.59l-8.02 8a2.01 2 0 0 0 0 2.83Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>12-Colors Alpha</h1>
            <h2>CSS Alpha Color Properties</h2>
        </header>
        <section>
            <h3>example trasparent colors</h3>
            <figure class="chococrispi">
                <div class="box1"></div>
                <div class="box2"></div>
                <div class="box3"></div>
            </figure>
        </section>
    </main>
