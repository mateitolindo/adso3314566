<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Referencia</title>
    <style>
        body { font-family: sans-serif; background-color: #222; color: white; padding: 20px; }
        form { border: 1px solid rgb(255, 60, 0); padding: 20px; max-width: 500px; display: grid; grid-template-columns: 120px 1fr; gap: 10px; }
        label { font-weight: bold; }
        input { padding: 5px; }
<link rel="stylesheet" href="../src/css/02-html.css">
</head>
    </style>
</head>
<body>
    <a href="../02-html/index.html"class="home-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" viewBox="0 0 256 256">
        <path d="M219,103.48V208a16,16,0,0,1-16,16H152a16,16,0,0,1-16-16V160H120v48a16,16,0,0,1-16,16H53a16,16,0,0,1-16-16V103.48a16,16,0,0,1,5.29-11.89l75-69.23a16,16,0,0,1,21.42,0l75,69.23A16,16,0,0,1,219,103.48Z"></path>
        </svg>
    </a>


    <form action="#">
        <label>type</label>
        <div>
            <input type="text" value="Texto">
            <input type="number" value="10">
            <input type="email" value="correo@ejemplo.com">
        </div>

        <label>name</label>
        <input type="text" name="usuario">

        <label>value</label>
        <input type="text" value="Valor inicial desde value">

        <label>size</label>
        <input type="text" size="12" value="size=12">

        <label>maxlength</label>
        <input type="text" maxlength="8" value="Max 8">

        <label>checked</label>
        <input type="checkbox" checked>

        <label>disabled</label>
        <input type="text" value="No editable" disabled>

        <label>readonly</label>
        <input type="text" value="Solo lectura" readonly>

        <label>min y max</label>
        <input type="number" min="1" max="18" value="18">

        <label>step</label>
        <input type="number" step="0.5" value="3.5">

        <label>placeholder</label>
        <input type="text" placeholder="Escribe tu ciudad">

        <label>required</label>
        <input type="text" required placeholder="Campo obligatorio">

        <label>Enviar</label>
        <button type="submit">Probar validacion</button>
    </form>

</body>
</html>
