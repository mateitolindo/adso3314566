<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>27-box-shadow</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        div.box{
            border-radius: 20%;
            height: 200px;
            width: 200px;
            background-color: rgb(255, 255, 255);
            margin: 0 auto;
        }
        div.box1{
            box-shadow: 0 0 12px #7829f0;
        }
        div.box2{
            box-shadow: -10px -10px 24px 0 #57ff79;
        }
        div.box3{
            box-shadow: 0 0 20px #fffa64
        }
        div.box4{
            box-shadow: 4px 4px 0 #cc0,
                        8px 8px 0 #00c,
                        12px 12px 0 #c00

        }
        div.images img{
        width: 300px;
        }
        div.images{
            display: flex;
            justify-content: center;
            margin-block: 2rem;
            gap: 1rem;
        }
        div.images img:first-child{
            box-shadow: 0 0 12px #fff;
        }
        div.images img:last-child{
            filter: drop-shadow(0 0 12px #fff);
        }

    </style>
</head>
