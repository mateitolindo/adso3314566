<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23 - Sprite </title>
    <link rel="stylesheet" href="../src/css/03-css.css">
<style>
    div#sprite {
        background: url(../src/imgs/anim-sprite.png);
        height: 256px;
        margin: 1rem auto;
        width: 256px;
    }
    div#sprite.sp1 {background-position: calc(-256px * 0) 0;}
    div#sprite.sp2 {background-position: calc(-256px * 1) 0;}
    div#sprite.sp3 {background-position: calc(-256px * 2) 0;}
    div#sprite.sp4 {background-position: calc(-256px * 3) 0;}
    div#sprite.sp5 {background-position: calc(-256px * 4) 0;}
    div#sprite.sp6 {background-position: calc(-256px * 5) 0;}

    /* Estilos para el segundo sprite con animation-sprite-sheet-bomb-explosion-sequence.png */
    div#sprite-bomb {
        background: url(../src/imgs/animation-sprite-sheet-bomb-explosion-sequence.png);
        height: 256px;
        margin: 1rem auto;
        width: 256px;
        transition: transform 0.3s ease;
    }
    
    /* Clases para los diferentes cuadros de animación de la bomba */
    div#sprite-bomb.bomb1 {background-position: calc(-256px * 0) 0;}
    div#sprite-bomb.bomb2 {background-position: calc(-256px * 1) 0;}
    div#sprite-bomb.bomb3 {background-position: calc(-256px * 2) 0;}
    div#sprite-bomb.bomb4 {background-position: calc(-256px * 3) 0;}
    div#sprite-bomb.bomb5 {background-position: calc(-256px * 4) 0;}
    div#sprite-bomb.bomb6 {background-position: calc(-256px * 5) 0;}
    div#sprite-bomb.bomb7 {background-position: calc(-256px * 6) 0;}
    div#sprite-bomb.bomb8 {background-position: calc(-256px * 7) 0;}

    /* Estilos para el botón home consistente con 07-inheritance.html */
    .btn-home {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0,0,0,0.7);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        z-index: 1000;
        text-decoration: none;
    }
    
    .btn-home:hover {
        background: rgba(0,0,0,0.9);
        transform: scale(1.1);
    }
    
    .SVGBGI {
        width: 24px;
        height: 24px;
    }
    
    .SVGBGI .accent {
        fill: #ff6b6b;
    }
    
    .SVGBGI .outline {
        fill: #fff;
    }
    
    .SVGBGI .solid {
        fill: #ff6b6b;
    }
    
    /* Estilos adicionales para mejor presentación */
    .sprite-container {
        display: flex;
        gap: 2rem;
        justify-content: center;
        flex-wrap: wrap;
        padding: 1rem;
    }
    
    .sprite-item {
        flex: 1;
        min-width: 280px;
        text-align: center;
    }
    
    .sprite-item h3 {
        color: #ff6b6b;
        margin-bottom: 1rem;
    }
    
    .recuadro {
        padding: 1rem;
    }
</style>
</head>
<body>
    <a class="btn-home" href="../03-css/index.html">
        <svg class="SVGBGI" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path class="accent" d="M12 20V4l-8 8 8 8z"></path>
            <path class="outline" d="m2.29,12.71l8,8c.39.39,1.02.39,1.41,0s.39-1.02,0-1.41l-6.29-6.29h15.59c.55,0,1-.45,1-1s-.45-1-1-1H5.41l6.29-6.29c.39-.39.39-1.02,0-1.41-.2-.2-.45-.29-.71-.29s-.51.1-.71.29L2.29,11.29c-.39.39-.39,1.02,0,1.41Z"></path>
            <path class="solid" d="m1.58 13.42 8 8a2 2 0 0 0 2.83-2.83L7.82 14h13.17c1.1 0 2-.9 2-2s-.9-2-2-2H7.83l4.59-4.59a2 2 0 0 0-1.41-3.42 2 2 0 0 0-1.41.59l-8.02 8a2.01 2.01 0 0 0 0 2.83Z"></path>
        </svg>
    </a>
    <main>
        <header>
            <h1>23 - Sprite</h1>
            <h2>This way we can include CSS within the style tag, it is very useful when you only have an html document.</h2>
        </header>
        
        <section>
            <div class="sprite-container">
                <div class="sprite-item">
                    <h3>Animation Sprite</h3>
                    <div class="recuadro">
                        <div id="sprite" class="sp1"></div>
                    </div>
                </div>
                
                <div class="sprite-item">
                    <h3>Bomb Explosion Sprite</h3>
                    <div class="recuadro">
                        <div id="sprite-bomb" class="bomb1"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <script>
        // Animación para el primer sprite (anim-sprite.png)
        const sprite = document.getElementById('sprite');
        const numSprite = 6;
        let count = 1;
        
        setInterval(() => {
            sprite.className = '';
            sprite.classList.add('sp' + count);
            if(count === numSprite) count = 1;
            else count++;
        }, 80);
        
        // Animación para el segundo sprite (animation-sprite-sheet-bomb-explosion-sequence.png)
        const bombSprite = document.getElementById('sprite-bomb');
        const numBombFrames = 8; // Número de cuadros en el sprite sheet de la bomba
        let bombCount = 1;
        
        setInterval(() => {
            if(bombSprite) {
                bombSprite.className = '';
                bombSprite.classList.add('bomb' + bombCount);
                if(bombCount === numBombFrames) bombCount = 1;
                else bombCount++;
            }
        }, 80); // Misma velocidad que el primer sprite
    </script>
</body>
</html>
