<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>36-transitions</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        main section {
            img {
                border: none;
                border-radius: 0;
                filter: drop-shadow(0 0 12px #fff);
            }

            img.transition01 {
                transition: transform 0.5s ease-in;

                &:hover {
                    transform: scale(1.3);
                }
            }

            img.transition02 {
                transition: transform 0.5s ease-out;

                &:hover {
                    transform: rotate(-0.5turn);
                }
            }

            img.transition03 {
                transition: transform 0.5s ease-in-out;

                &:hover {
                    transform: rotateY(180deg);
                }
            }

            img.transition04 {
                transition: transform 0.5s linear;

                &:hover {
                    transform: translateX(80px);
                }
            }

            .contenedor-padre {
                display: flex;
                justify-content: center;
                /* Centra horizontalmente */
                align-items: center;
                /* Centra verticalmente */
            }

            div.box {

                background-color: #fff;
                height: 80px;
                margin-block: 2rem;
                width: 80px;
                transition: width 1s,
                    height 1s 1s,
                    background-color 1s 2s;

                &:hover {
                    background-color: red;
                    width: 300px;
                    height: 160px;
                }
            }
        }
    </style>
</head>

<body>
    <a class="btn-home" href="index.html">
        <svg class="SVGBGI" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path class="accent" d="M12 20V4l-8 8 8 8z"></path>
            <path class="outline"
                d="m2.29,12.71l8,8c.39.39,1.02.39,1.41,0s.39-1.02,0-1.41l-6.29-6.29h15.59c.55,0,1-.45,1-1s-.45-1-1-1H5.41l6.29-6.29c.39-.39.39-1.02,0-1.41-.2-.2-.45-.29-.71-.29s-.51.1-.71.29L2.29,11.29c-.39.39-.39,1.02,0,1.41Z">
            </path>
            <path class="solid"
                d="m1.58 13.42 8 8a2 2 0 0 0 2.83-2.83L7.82 14h13.17c1.1 0 2-.9 2-2s-.9-2-2-2H7.83l4.59-4.59a2 2 0 0 0-1.41-3.42 2 2 0 0 0-1.41.59l-8.02 8a2.01 2.01 0 0 0 0 2.83Z">
            </path>
        </svg>
    </a>
    <main>
        <header>
            <h1>36-Transitions</h1>
            <h2>Enable you to define the transition between two states of an element</h2>
        </header>
        <section>
            <div class="recuadro">
                <h3>Scale(1. 4)</h3>
                <img class="transition01" src="../src/imgs/dk.png" alt="DK">
                <h3>Rotate(-180deg):</h3>
                <img class="transition02" src="../src/imgs/dk.png" alt="DK">
                <h3>RotateY(180deg):</h3>
                <img class="transition03" src="../src/imgs/dk.png" alt="DK">
                <h3>TranslateX(100px):</h3>
                <img class="transition04" src="../src/imgs/dk.png" alt="DK">
                <h3>Multiple:</h3>
                <div class="box"></div>
            </div>
        </section>
    </main>
</body>

</html>
