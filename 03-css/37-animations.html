<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>37-animations</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        /* Estilos para centrar todo el contenido en la pantalla */
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
        }

        /* El botón home lo dejamos en su posición fija original */
        .btn-home {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        /* Centramos el contenido del main */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex: 1;
        }

        /* Centramos el header */
        main header {
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Centramos la sección que contiene el jungle */
        main section {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Estilos del jungle - sin cambios en su estructura interna */
        main section div.jungle {
            background: url(../src/imgs/jungle.png) no-repeat center;
            border-radius: 4px;
            margin-block: 2rem;
            position: relative;
            height: 471px;
            width: 380px;
        }

        main section div.jungle img {
            border-radius: 0%;
            border: none;
            position: absolute;
        }

        main section div.jungle img.logo {
            top: 35px;
            left: 30px;
            height: 70px;
            object-fit: contain;
            z-index: 9;
            width: 317px;
            animation: 1s animLogo ease-in infinite;
        }

        main section div.jungle img.dk {
            top: 120px;
            left: 120px;
            width: 140px;
            object-fit: contain;
            z-index: 8;
            animation: 2s animDK ease-out infinite;
        }

        main section div.jungle div.move {
            position: absolute;
            top: 240px;
            left: 0;
        }

        main section div.jungle div.move img.ryno {
            width: 140px;
            object-fit: contain;
            top: 0;
            animation: 3s animRyno linear infinite;
        }

        @keyframes animLogo {
            0%, 10% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        @keyframes animDK {
            0% {
                top: 130px;
                transform: rotateX(0deg);
            }
            40% {
                top: 80px;
                transform: rotateX(0deg);
            }
            50% {
                top: 80px;
                transform: rotateX(360deg);
            }
            60% {
                top: 80px;
                transform: rotateX(360deg);
            }
            100% {
                top: 130px;
                transform: rotateX(360deg);
            }
        }

        @keyframes animRyno {
            0% {
                left: 0;
                top: 0;
                transform: scaleX(1) translateY(0);
            }
            10% {
                top: -6px;
                transform: scaleX(1) translateY(0);
            }
            20% {
                top: 0;
                transform: scaleX(1) translateY(0);
            }
            22% {
                left: 100px;
                top: 0;
                transform: scaleX(1) translateY(0);
            }
            25% {
                left: 120px;
                top: -110px;
                transform: scaleX(1) translateY(0);
            }
            28% {
                left: 140px;
                top: 0;
                transform: scaleX(1) translateY(0);
            }
            40% {
                left: 200px;
                top: -6px;
                transform: scaleX(1) translateY(0);
            }
            50% {
                left: 240px;
                top: 0;
                transform: scaleX(1) translateY(0);
            }
            55% {
                left: 235px;
                top: -6px;
                transform: scaleX(-1) translateY(0);
            }
            60% {
                left: 220px;
                top: 0;
                transform: scaleX(-1) translateY(0);
            }
            72% {
                left: 140px;
                top: 0;
                transform: scaleX(-1) translateY(0);
            }
            75% {
                left: 120px;
                top: -110px;
                transform: scaleX(-1) translateY(0);
            }
            78% {
                left: 100px;
                top: 0;
                transform: scaleX(-1) translateY(0);
            }
            85% {
                left: 50px;
                top: -6px;
                transform: scaleX(-1) translateY(0);
            }
            100% {
                left: 0;
                top: 0;
                transform: scaleX(-1) translateY(0);
            }
        }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg class="SVGBGI" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path class="accent" d="M12 20V4l-8 8 8 8z"></path>
            <path class="outline" d="m2.29,12.71l8,8c.39.39,1.02.39,1.41,0s.39-1.02,0-1.41l-6.29-6.29h15.59c.55,0,1-.45,1-1s-.45-1-1-1H5.41l6.29-6.29c.39-.39.39-1.02,0-1.41-.2-.2-.45-.29-.71-.29s-.51.1-.71.29L2.29,11.29c-.39.39-.39,1.02,0,1.41Z"></path>
            <path class="solid" d="m1.58 13.42 8 8a2 2 0 0 0 2.83-2.83L7.82 14h13.17c1.1 0 2-.9 2-2s-.9-2-2-2H7.83l4.59-4.59a2 2 0 0 0-1.41-3.42 2 2 0 0 0-1.41.59l-8.02 8a2.01 2.01 0 0 0 0 2.83Z"></path>
        </svg>
    </a>
    <main>
        <header>
            <h1>37-Animations</h1>
            <h2>Description</h2>
        </header>
        <section>
            <div class="jungle">
                <img src="../src/imgs/logo-dk.png" class="logo" alt="Donkey Kong Logo">
                <img src="../src/imgs/dk.png" class="dk" alt="Donkey Kong">
                <div class="move">
                    <img src="../src/imgs/ryno.png" class="ryno" alt="Ryno">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
