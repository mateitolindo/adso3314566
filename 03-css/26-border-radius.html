<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>26-border-radius</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
    .circulo {
    width: 120px;
    height: 120px;
    background-color: #fff6;
    border-radius: 50%;
    text-align: center;

    }
    .caja-irregular {
    width: 120px;
    height: 120px;
    background-color: #fff6;
    border-radius: 20px 50px 10px 40px;
    }
    .ejemplos-container {
        display: flex;
        flex-wrap: wrap;
        gap: 2rem;
        justify-content: center;
        align-items: flex-start;
        margin-top: 2rem;
        border-top: 2px solid #fff6;
        padding-top: 2rem;
    }

    .ejemplo-item {
        text-align: center;

        border-radius: 12px;
        padding: 1rem;
        width: 180px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .ejemplo-item p {
        margin-top: 0.5rem;
        font-weight: bold;
        font-family: monospace;
    }
    .ejemplo-pildora {
        width: 120px;
        height: 60px;
        background-color: #fff6;
        border-radius: 60px / 30px;
        margin: 0 auto;
    }

    .ejemplo-esquina-unica {
        width: 120px;
        height: 120px;
        background-color: #fff6;
        border-radius: 40px 0 0 0;
        margin: 0 auto;
    }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg class="SVGBGI" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path class="accent" d="M12 20V4l-8 8 8 8z"></path><path class="outline" d="m2.29,12.71l8,8c.39.39,1.02.39,1.41,0s.39-1.02,0-1.41l-6.29-6.29h15.59c.55,0,1-.45,1-1s-.45-1-1-1H5.41l6.29-6.29c.39-.39.39-1.02,0-1.41-.2-.2-.45-.29-.71-.29s-.51.1-.71.29L2.29,11.29c-.39.39-.39,1.02,0,1.41Z"></path><path class="solid" d="m1.58 13.42 8 8a2 2 0 0 0 2.83-2.83L7.82 14h13.17c1.1 0 2-.9 2-2s-.9-2-2-2H7.83l4.59-4.59a2 2 0 0 0-1.41-3.42 2 2 0 0 0-1.41.59l-8.02 8a2.01 2.01 0 0 0 0 2.83Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>26-Border Radius</h1>
            <h2>Description</h2>
        </header>
        <section>
            <div class="recuadro">
                <h3 style="margin-top: 2rem;">Ejemplos de radios </h3>
                <div class="ejemplos-container">
                    <div class="ejemplo-item">
                        <div class="circulo"></div>
                        <p>border-radius: 50%<br>(círculo)</p>
                    </div>
                    <div class="ejemplo-item">
                        <div class="caja-irregular"></div>
                        <p>border-radius: 20px 50px 10px 40px</p>
                    </div>
                    <div class="ejemplo-item">
                        <div class="ejemplo-pildora"></div>
                        <p>border-radius: 60px / 30px<br>ovalo</p>
                    </div>
                    <div class="ejemplo-item">
                        <div class="ejemplo-esquina-unica"></div>
                        <p>border-radius: 40px 0 0 0<br>(solo arriba-izq)</p>
                    </div>
                </div>
        </section>
    </main>
</body>
</html>
