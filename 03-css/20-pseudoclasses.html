<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20-pseudoclasses</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        .ps-demo { display: flex; flex-direction: column; gap: 14px; width: min(760px, 100%); }
        .ps-card { padding: 14px; border-radius: 16px; background: rgba(255,255,255,0.9); color: #5D0065; }
        .ps-link:link { color: #2563eb; }
        .ps-link:visited { color: #7c3aed; }
        .ps-link:hover { color: #dc2626; text-decoration: underline; }
        .ps-link:active { color: #111827; }
        .ps-input { width: 100%; max-width: 360px; padding: 12px; border-radius: 14px; border: 2px solid rgba(93,0,101,0.25); outline: none; }
        .ps-input:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37,99,235,0.25); }
        .ps-btn { padding: 12px 14px; border-radius: 14px; border: 0; background: #6B46C1; color: #fff; cursor: pointer; }
        .ps-btn:hover { filter: brightness(1.06); }
        .ps-btn:active { transform: translateY(1px); }
        .ps-list { margin: 0; padding-left: 18px; }
        .ps-list li:first-child { font-weight: 900; }
    </style>
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg class="SVGBGI" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path class="accent" d="M12 20V4l-8 8 8 8z"></path><path class="outline" d="m2.29,12.71l8,8c.39.39,1.02.39,1.41,0s.39-1.02,0-1.41l-6.29-6.29h15.59c.55,0,1-.45,1-1s-.45-1-1-1H5.41l6.29-6.29c.39-.39.39-1.02,0-1.41-.2-.2-.45-.29-.71-.29s-.51.1-.71.29L2.29,11.29c-.39.39-.39,1.02,0,1.41Z"></path><path class="solid" d="m1.58 13.42 8 8a2 2 0 0 0 2.83-2.83L7.82 14h13.17c1.1 0 2-.9 2-2s-.9-2-2-2H7.83l4.59-4.59a2 2 0 0 0-1.41-3.42 2 2 0 0 0-1.41.59l-8.02 8a2.01 2 0 0 0 0 2.83Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>20-Pseudoclasses</h1>
            <h2>CSS Pseudoclasses</h2>
        </header>
        <section>
            <div>
                <div class="ps-demo">
                    <div class="ps-card">
                        <h3 style="margin: 0 0 10px 0;">:link / :visited / :hover / :active</h3>
                        <a class="ps-link" href="https://example.com" target="_blank" rel="noreferrer">Pasa el mouse y haz click en este link</a>
                    </div>

                    <div class="ps-card">
                        <h3 style="margin: 0 0 10px 0;">:focus</h3>
                        <input class="ps-input" type="text" placeholder="Haz click aquí (input:focus)" />
                    </div>

                    <div class="ps-card">
                        <h3 style="margin: 0 0 10px 0;">:hover / :active</h3>
                        <button class="ps-btn" type="button">Pásame el mouse y clic</button>
                    </div>

                    <div class="ps-card">
                        <h3 style="margin: 0 0 10px 0;">:first-child</h3>
                        <ul class="ps-list">
                            <li>Primer item (bold)</li>
                            <li>Segundo item</li>
                            <li>Tercer item</li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
