<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18-typography</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
</head>
<body>
    <a class="btn-home" href="index.html">
        <svg class="SVGBGI" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path class="accent" d="M12 20V4l-8 8 8 8z"></path><path class="outline" d="m2.29,12.71l8,8c.39.39,1.02.39,1.41,0s.39-1.02,0-1.41l-6.29-6.29h15.59c.55,0,1-.45,1-1s-.45-1-1-1H5.41l6.29-6.29c.39-.39.39-1.02,0-1.41-.2-.2-.45-.29-.71-.29s-.51.1-.71.29L2.29,11.29c-.39.39-.39,1.02,0,1.41Z"></path><path class="solid" d="m1.58 13.42 8 8a2 2 0 0 0 2.83-2.83L7.82 14h13.17c1.1 0 2-.9 2-2s-.9-2-2-2H7.83l4.59-4.59a2 2 0 0 0-1.41-3.42 2 2 0 0 0-1.41.59l-8.02 8a2.01 2 0 0 0 0 2.83Z"></path></svg>
    </a>
    <main>
        <header>
            <h1>18-Typography</h1>
            <h2>CSS Typography Properties</h2>
            <ul>
                <li>Color</li>
                <li>Family</li>
                <li>Size</li>
                <li>Weight</li>
            </ul>
        </header>
        <section>
            <div>
                <div style="display: flex; flex-direction: column; gap: 14px; width: min(700px, 100%);">
                    <div style="padding: 14px; border-radius: 16px; background: rgba(255,255,255,0.9); color: #5D0065;">
                        <h3 style="margin: 0 0 8px 0;">color</h3>
                        <p style="margin: 0; color: #2563eb;">Este texto usa color: #2563eb</p>
                    </div>

                    <div style="padding: 14px; border-radius: 16px; background: rgba(255,255,255,0.9); color: #5D0065;">
                        <h3 style="margin: 0 0 8px 0;">font-family</h3>
                        <p style="margin: 0; font-family: 'Times New Roman', Times, serif;">Serif: Times New Roman</p>
                        <p style="margin: 8px 0 0 0; font-family: Arial, Helvetica, sans-serif;">Sans-serif: Arial</p>
                        <p style="margin: 8px 0 0 0; font-family: 'Courier New', Courier, monospace;">Monospace: Courier New</p>
                    </div>

                    <div style="padding: 14px; border-radius: 16px; background: rgba(255,255,255,0.9); color: #5D0065;">
                        <h3 style="margin: 0 0 8px 0;">font-size</h3>
                        <p style="margin: 0; font-size: 14px;">14px</p>
                        <p style="margin: 6px 0 0 0; font-size: 22px;">22px</p>
                        <p style="margin: 6px 0 0 0; font-size: 32px;">32px</p>
                    </div>

                    <div style="padding: 14px; border-radius: 16px; background: rgba(255,255,255,0.9); color: #5D0065;">
                        <h3 style="margin: 0 0 8px 0;">font-weight</h3>
                        <p style="margin: 0; font-weight: 300;">font-weight: 300</p>
                        <p style="margin: 6px 0 0 0; font-weight: 600;">font-weight: 600</p>
                        <p style="margin: 6px 0 0 0; font-weight: 900;">font-weight: 900</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
